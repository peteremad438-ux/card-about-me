<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Peter Emad - Front-end Developer Portfolio & Social Media"
    />
    <title>Peter Emad | Front-end Developer</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css"
    />
  </head>
  <body>
    <main class="container">
      <div class="profile-card">
        <div class="profile-header">
          <div class="image-wrapper">
            <img
              src="pepo.jpg"
              alt="Peter Emad"
              class="profile-image"
            />
          </div>
        </div>

        <div class="profile-info">
          <h1 class="name">Peter Emad</h1>
          <p class="job-title">Front-end Developer</p>
          <p class="bio">
            Turning ideas into interactive digital experiences with precision
            and style.
          </p>
        </div>

        <div class="social-links">
          <a
            target="_blank"
            href="https://www.facebook.com/share/1B4WXfNjKq/"
            class="social-link facebook"
            aria-label="Facebook"
          >
            <i class="bx bxl-facebook-circle"></i>
            <span>Facebook</span>
          </a>
          <a
            target="_blank"
            href="https://www.instagram.com/pepoo__emad?igsh=dmdpbHBrMDB5YzNj"
            class="social-link instagram"
            aria-label="Instagram"
          >
            <i class="bx bxl-instagram-alt"></i>
            <span>Instagram</span>
          </a>
          <a
            target="_blank"
            href="https://wa.me/201212713718"
            class="social-link whatsapp"
            aria-label="WhatsApp"
          >
            <i class="bx bxl-whatsapp"></i>
            <span>WhatsApp</span>
          </a>
          <a
            target="_blank"
            href="https://www.tiktok.com/@_peteremad_?_r=1&_t=ZS-95orUtT2MWS"
            class="social-link tiktok"
            aria-label="TikTok"
          >
            <i class="bx bxl-tiktok"></i>
            <span>TikTok</span>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
